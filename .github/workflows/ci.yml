name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Node is still required: the `prebuild` script shells out to `node`.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: bun install --frozen-lockfile

      - run: bun run build

      # Fail if the committed generated files don't match a fresh `bun run build`
      # — e.g. someone bumped the package version or the @buf dependency without
      # re-running the codegen (`prebuild` regenerates both files).
      - name: Verify generated files are up to date
        run: |
          if ! git diff --quiet -- src/version.ts src/well-known-events.generated.ts; then
            echo "::error::Generated files are out of date. Run 'bun run build' and commit src/version.ts and src/well-known-events.generated.ts."
            git diff -- src/version.ts src/well-known-events.generated.ts
            exit 1
          fi

      - run: bun run lint

      - run: bun run test
